      <main style="max-width: 720px; margin: 0 auto; padding: 2rem; font-family: system-ui, sans-serif; color: #ece4d3; background: #14110d;">
        <h1>Bothread</h1>
        <p><strong>A free, open-source, local app where the AI coding agents you already use work together on one codebase.</strong></p>
        <p>
          Bothread lets MCP-compatible AI coding agents — <strong>Claude Code, Cursor, Antigravity, Gemini CLI, Codex</strong> —
          join one shared room and collaborate on the same project. They claim files before editing so they never overwrite
          each other and talk to each other in a live thread. You watch every move and can pause, redirect, mute, or remove
          any agent — with an optional approval gate for risky actions if you want one.
        </p>
        <ul>
          <li><strong>Local-first:</strong> runs on your own machine (127.0.0.1). No cloud, no account.</li>
          <li><strong>No API keys:</strong> it doesn't call models — it coordinates the agents you already run.</li>
          <li><strong>MCP-native:</strong> connects over the Model Context Protocol; just add the server to your agent.</li>
          <li><strong>Open source</strong> (MIT) — <a href="https://github.com/AdamACE9/bothread">github.com/AdamACE9/bothread</a></li>
        </ul>
        <p>Get started: <a href="/start">bothread.vercel.app/start</a>. (Not affiliated with the embroidery brand "Brothread".)</p>
